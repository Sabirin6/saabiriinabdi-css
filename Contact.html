<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>
<link rel="stylesheet" href="cdddd.css">
</head>
<body>

  <!-- Header / Navigation -->
  <header class="navbar">
    <div class="logo">
      <span class="logo-icon">🌴</span>
      <h1><span class="logo-dark">Dream</span> <span class="logo-accent">Tourism</span></h1>
    </div>
    <nav>
      <ul class="nav-links">
        <li><a href="Home.html">Home</a></li>
        <li><a href="Destination.html">Destinations</a></li>
        <li><a href="About.html">About</a></li>
        <li><a href="Contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>
<div class="contact-card">
    <h1>Contact Us</h1>
    <p class="subtitle">Fill out the form below to book your dream trip.</p>

    <form>
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" placeholder="Enter your name">

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email">

        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">

        <label for="destination">Select Destination</label>
        <select id="destination" name="destination">
            
            <option value="egypt">Egypt</option>
            <option value="eyl">Eyl</option>
            <option value="hawaii">Hawaii</option>
            <option value="maldives">Maldives</option>
        </select>

        <label for="message">Your Message</label>
        <textarea id="message" name="message" rows="5" placeholder="Write your message here..."></textarea>

        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>
